<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浪漫视频播放</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: radial-gradient(circle at top, #ffd1dc 0%, #ff8fb1 45%, #811f66 100%);
      color: #fff;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      max-width: 760px;
      margin: 24px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.25);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 40%),
                        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 22%),
                        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 18%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 25%);
    }

    .content {
      position: relative;
      padding: 40px 32px 32px;
      text-align: center;
      z-index: 1;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: 0.04em;
      text-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    p {
      margin: 0 0 28px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.9);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 16px 28px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(135deg, #ffffff, #ffd2e8);
      color: #5d194d;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.22);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      margin-top: 24px;
      background: rgba(0, 0, 0, 0.12);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
    }

    .video-visible video {
      display: block;
    }

    .hint {
      margin-top: 18px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.82);
    }

    @media (max-width: 600px) {
      .scene {
        margin: 16px;
        border-radius: 22px;
      }

      .content {
        padding: 28px 20px 24px;
      }

      h1 {
        font-size: 2.4rem;
      }

      p {
        font-size: 1rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="overlay"></div>
    <div class="content">
      <h1>为你播放一份浪漫</h1>
      <p>点击下方按钮，瞬间唤醒画面中的温柔与回忆。视频会立刻开始播放，轻柔的氛围已为你准备好。</p>
      <button id="playButton">播放浪漫视频</button>
      <div class="hint">视频文件：hah.mp4</div>
      <div id="videoWrapper" class="video-wrapper">
        <video id="romanticVideo" playsinline controls>
          <source src="./hah.mp4" type="video/mp4" />
          您的浏览器不支持播放此视频。
        </video>
      </div>
    </div>
  </div>

  <script>
    const playButton = document.getElementById('playButton');
    const videoWrapper = document.getElementById('videoWrapper');
    const romanticVideo = document.getElementById('romanticVideo');

    playButton.addEventListener('click', () => {
      videoWrapper.classList.add('video-visible');
      romanticVideo.play().catch(() => {
        // 若自动播放被阻止，则可在用户再次点击时播放
      });
      playButton.textContent = '正在播放...';
      playButton.disabled = true;
      playButton.style.opacity = '0.85';
    });
  </script>
</body>
</html>
